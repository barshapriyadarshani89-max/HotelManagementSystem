<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>

    <!-- Meta redirect (backup) -->
    <meta http-equiv="refresh" content="0; url=website/index.html">

    <script>
        // JavaScript redirect (main)
        window.location.replace("website/index.html");
    </script>
</head>
<body>
    <p>If you are not redirected automatically, 
       <a href="website/index.html">click here</a>.
    </p>
</body>
</html>
