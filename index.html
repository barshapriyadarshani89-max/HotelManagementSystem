<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Management — Dashboard</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">🏨 HotelMS</div>
  <a href="index.html"    class="nav-item active"><span class="nav-icon">📊</span> Dashboard</a>
  <a href="rooms.html"    class="nav-item"><span class="nav-icon">🛏️</span> Rooms</a>
  <a href="guests.html"   class="nav-item"><span class="nav-icon">👥</span> Guests</a>
  <a href="bookings.html" class="nav-item"><span class="nav-icon">📅</span> Bookings</a>
  <a href="billing.html"  class="nav-item"><span class="nav-icon">💰</span> Billing</a>
  <a href="staff.html"    class="nav-item"><span class="nav-icon">👷</span> Staff</a>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="page-header">
    <h1>Dashboard</h1>
    <p>Welcome back! Here's what's happening today.</p>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon">🛏️</div>
      <div class="stat-label">Total Rooms</div>
      <div class="stat-value" id="totalRooms">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">✅</div>
      <div class="stat-label">Available</div>
      <div class="stat-value" id="availableRooms">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">👥</div>
      <div class="stat-label">Total Guests</div>
      <div class="stat-value" id="totalGuests">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">📅</div>
      <div class="stat-label">Bookings</div>
      <div class="stat-value" id="totalBookings">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">💰</div>
      <div class="stat-label">Revenue</div>
      <div class="stat-value" id="totalRevenue">₹0</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">👷</div>
      <div class="stat-label">Staff</div>
      <div class="stat-value" id="totalStaff">0</div>
    </div>
  </div>

  <div class="table-card">
    <div class="table-header">
      <h2>Recent Bookings</h2>
      <a href="bookings.html" class="btn btn-primary btn-sm">View All</a>
    </div>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Guest</th>
          <th>Room</th>
          <th>Check In</th>
          <th>Check Out</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="recentBookings">
        <tr><td colspan="6" class="empty-state">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</main>

<script>
const API = 'http://localhost:8080/api';

async function loadDashboard() {
  const [rooms, guests, bookings, bills, staff] = await Promise.all([
    fetch(`${API}/rooms`).then(r => r.json()),
    fetch(`${API}/guests`).then(r => r.json()),
    fetch(`${API}/bookings`).then(r => r.json()),
    fetch(`${API}/bills`).then(r => r.json()),
    fetch(`${API}/staff`).then(r => r.json()),
  ]);

  document.getElementById('totalRooms').textContent     = rooms.length;
  document.getElementById('availableRooms').textContent = rooms.filter(r => r.status === 'AVAILABLE').length;
  document.getElementById('totalGuests').textContent    = guests.length;
  document.getElementById('totalBookings').textContent  = bookings.length;
  document.getElementById('totalStaff').textContent     = staff.length;

  const revenue = bills.filter(b => b.paymentStatus === 'PAID').reduce((s, b) => s + b.grandTotal, 0);
  document.getElementById('totalRevenue').textContent = '₹' + revenue.toFixed(0);

  const tbody = document.getElementById('recentBookings');
  const recent = bookings.slice(-5).reverse();
  if (recent.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No bookings yet</td></tr>';
    return;
  }
  tbody.innerHTML = recent.map(b => `
    <tr>
      <td>#${b.id}</td>
      <td>${b.guest?.name || '-'}</td>
      <td>${b.room?.roomNumber || '-'}</td>
      <td>${b.checkInDate}</td>
      <td>${b.checkOutDate}</td>
      <td>${statusBadge(b.status)}</td>
    </tr>
  `).join('');
}

function statusBadge(status) {
  const map = {
    BOOKED: 'badge-info', CHECKED_IN: 'badge-success',
    CHECKED_OUT: 'badge-gray', CANCELLED: 'badge-danger'
  };
  return `<span class="badge ${map[status] || 'badge-gray'}">${status}</span>`;
}

loadDashboard();
</script>
</body>
</html>
